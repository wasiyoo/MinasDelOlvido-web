<style>
html,body,#canvas{margin:0;padding:0;border:0}
body{color:#f0e6d8;background:#0c0612;overflow:hidden;touch-action:none;font-family:Segoe UI,Noto Sans,Arial,sans-serif}
#canvas{display:block}
#canvas:focus{outline:none}
#status{
  position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:radial-gradient(ellipse at center,#1a0f24 0%,#0c0612 72%);
  visibility:hidden;gap:14px;z-index:10;
}
#status-title{font-size:clamp(22px,4vw,36px);letter-spacing:.06em;color:#f5e6c8;text-shadow:0 2px 8px #000;margin:0}
#status-sub{font-size:14px;color:#b894cc;margin:0}
#status-label{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#cbb8d8;margin:8px 0 0}
#status-progress{
  width:min(50%,320px);height:12px;appearance:none;border:1px solid #6a3a7a;border-radius:6px;
  background:#1a1020;display:none;
}
#status-progress::-webkit-progress-bar{background:#1a1020;border-radius:6px}
#status-progress::-webkit-progress-value{background:linear-gradient(90deg,#7a3aad,#c46bff);border-radius:6px}
#status-progress::-moz-progress-bar{background:linear-gradient(90deg,#7a3aad,#c46bff);border-radius:6px}
#status-notice{
  display:none;background:#5b3943;border:1px solid #9b3943;border-radius:.5rem;color:#e0e0e0;
  line-height:1.3;margin:0 2rem;padding:1rem;text-align:center;max-width:28rem;
}
/* Never show Godot default splash image */
#status-splash{display:none!important}
</style>
</head>
<body>
<canvas id="canvas">Tu navegador no soporta canvas.</canvas>
<noscript>Activa JavaScript para jugar Minas del Olvido.</noscript>
<div id="status">
  <!-- sin <img>: evita logo Godot cacheado en index.png -->
  <img id="status-splash" class="show-image--false" alt="" style="display:none">
  <h1 id="status-title">MINAS DEL OLVIDO</h1>
  <p id="status-sub">La Veta del Diablo</p>
  <div id="status-label">CargandoÃƒÂ¢Ã¢â€šÂ¬Ã‚Â¦</div>
  <progress id="status-progress"></progress>
  <div id="status-notice"></div>
</div>
<script src="index.js?v=20260714113241"></script>
<script>
// HARD cache reset once (kills old Godot splash in service worker)
(function(){
  var KEY = 'minas_sw_reset_v5_pwa_icons';
  if (localStorage.getItem(KEY)) return;
  if (!('serviceWorker' in navigator)) { localStorage.setItem(KEY,'1'); return; }
  navigator.serviceWorker.getRegistrations().then(function(regs){
    return Promise.all(regs.map(function(r){ return r.unregister(); }));
  }).then(function(){
    if (window.caches && caches.keys) {
      return caches.keys().then(function(keys){
        return Promise.all(keys.map(function(k){ return caches.delete(k); }));
      });
    }
  }).then(function(){
    localStorage.setItem(KEY,'1');
    location.reload(true);
  }).catch(function(){ localStorage.setItem(KEY,'1'); });
})();
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":9574916,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
  // Force update service worker so old Godot splash cache dies
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ r.update(); });
    });
  }

  const statusOverlay = document.getElementById('status');
  const statusProgress = document.getElementById('status-progress');
  const statusNotice = document.getElementById('status-notice');
  const statusLabel = document.getElementById('status-label');
  let initializing = true;
  let statusMode = '';

  function setStatusMode(mode) {
    if (statusMode === mode || !initializing) return;
    if (mode === 'hidden') {
      statusOverlay.remove();
      initializing = false;
      return;
    }
    statusOverlay.style.visibility = 'visible';
    statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
    if (statusLabel) statusLabel.style.display = mode === 'progress' ? 'block' : 'none';
    statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
    statusMode = mode;
  }

  function setStatusNotice(text) {
    statusNotice.textContent = '';
    String(text).split('\n').forEach(function(line){
      statusNotice.appendChild(document.createTextNode(line));
      statusNotice.appendChild(document.createElement('br'));
    });
  }

  function displayFailureNotice(err) {
    console.error(err);
    setStatusNotice(err && err.message ? err.message : String(err || 'Error desconocido'));
    setStatusMode('notice');
    initializing = false;
  }

  const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
  if (missing.length !== 0) {
    displayFailureNotice('Faltan funciones del navegador:\n' + missing.join('\n'));
    return;
  }

  setStatusMode('progress');
  engine.startGame({
    onProgress: function (current, total) {
      if (current > 0 && total > 0) {
        statusProgress.value = current;
        statusProgress.max = total;
        if (statusLabel) statusLabel.textContent = 'CargandoÃƒÂ¢Ã¢â€šÂ¬Ã‚Â¦ ' + Math.min(100, Math.round(current / total * 100)) + '%';
      } else {
        statusProgress.removeAttribute('value');
        statusProgress.removeAttribute('max');
        if (statusLabel) statusLabel.textContent = 'CargandoÃƒÂ¢Ã¢â€šÂ¬Ã‚Â¦';
      }
    }
  }).then(function () {
    setStatusMode('hidden');
  }, displayFailureNotice);
})();
</script>
</body>
</html>
