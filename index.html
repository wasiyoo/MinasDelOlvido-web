<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Minas del Olvido</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: #f0e6d8;
	background-color: #0c0612;
	overflow: hidden;
	touch-action: none;
	font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background: radial-gradient(ellipse at center, #1a0f24 0%, #0c0612 70%);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
	gap: 12px;
}

#status-splash {
	max-height: 70%;
	max-width: 90%;
	margin: 0 auto;
	object-fit: contain;
	image-rendering: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	position: relative;
	bottom: auto;
	width: min(50%, 320px);
	height: 12px;
	margin: 0 auto;
	appearance: none;
	border: 1px solid #6a3a7a;
	border-radius: 6px;
	background: #1a1020;
	overflow: hidden;
}

#status-progress::-webkit-progress-bar {
	background: #1a1020;
	border-radius: 6px;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #7a3aad, #c46bff);
	border-radius: 6px;
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #7a3aad, #c46bff);
	border-radius: 6px;
}

#status-label {
	font-size: 14px;
	letter-spacing: 0.08em;
	color: #cbb8d8;
	text-transform: uppercase;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
		<link rel="manifest" href="index.manifest.json">
		<meta name="theme-color" content="#1a0d24">
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="apple-mobile-web-app-title" content="Minas del Olvido">
	</head>
	<body>
		<canvas id="canvas">
			Tu navegador no soporta canvas.
		</canvas>

		<noscript>
			Activa JavaScript para jugar Minas del Olvido.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--false use-filter--false" src="index.png" alt="Minas del Olvido">
			<div id="status-label">Cargando…</div>
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":9543284,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const statusLabel = document.getElementById('status-label');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		if (statusLabel) {
			statusLabel.style.display = mode === 'progress' ? 'block' : 'none';
		}
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('Ocurrió un error desconocido.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		const missingMsg = 'Error\nFaltan funciones del navegador para ejecutar el juego:\n';
		displayFailureNotice(missingMsg + missing.join('\n'));
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
					if (statusLabel) {
						const pct = Math.min(100, Math.round((current / total) * 100));
						statusLabel.textContent = 'Cargando… ' + pct + '%';
					}
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
					if (statusLabel) {
						statusLabel.textContent = 'Cargando…';
					}
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
