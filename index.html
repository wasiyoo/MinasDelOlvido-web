		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":17711592,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());

<script id="pwa-install-js">
(function () {
  var banner = document.getElementById('pwa-install-banner');
  var btn = document.getElementById('pwa-install-btn');
  var sub = document.getElementById('pwa-install-sub');
  var dismiss = document.getElementById('pwa-dismiss');
  if (!banner || !btn) return;

  var LS_KEY = 'minas_pwa_install_dismissed_v1';
  var deferred = null;
  var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
    || window.navigator.standalone === true;
  if (isStandalone) return;
  if (localStorage.getItem(LS_KEY) === '1') return;

  function isIos() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }
  function isAndroid() {
    return /android/i.test(navigator.userAgent);
  }
  function show() {
    banner.classList.add('show');
  }
  function hide() {
    banner.classList.remove('show');
  }

  dismiss.addEventListener('click', function () {
    localStorage.setItem(LS_KEY, '1');
    hide();
  });

  // Android / Chrome: evento nativo de instalacion
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    sub.textContent = 'Instalala y se abrira a pantalla completa, como una app.';
    btn.textContent = 'Instalar';
    show();
  });

  window.addEventListener('appinstalled', function () {
    deferred = null;
    localStorage.setItem(LS_KEY, '1');
    hide();
  });

  btn.addEventListener('click', function () {
    if (deferred) {
      deferred.prompt();
      deferred.userChoice.then(function (choice) {
        deferred = null;
        if (choice && choice.outcome === 'accepted') {
          localStorage.setItem(LS_KEY, '1');
        }
        hide();
      });
      return;
    }
    if (isIos()) {
      sub.textContent = 'En Safari: toca Compartir y luego "Anadir a pantalla de inicio".';
      btn.textContent = 'Entendido';
      btn.onclick = function () {
        localStorage.setItem(LS_KEY, '1');
        hide();
      };
      return;
    }
    // Fallback si el navegador no dispara beforeinstallprompt
    sub.textContent = 'Menu del navegador (â‹®) â†’ "Instalar app" o "Anadir a pantalla de inicio".';
    btn.textContent = 'Entendido';
    btn.onclick = function () {
      localStorage.setItem(LS_KEY, '1');
      hide();
    };
  });

  // iOS / otros: mostrar ayuda de instalacion tras un rato (engagement)
  setTimeout(function () {
    if (deferred || banner.classList.contains('show')) return;
    if (isIos()) {
      sub.textContent = 'En Safari: Compartir â†’ "Anadir a pantalla de inicio".';
      btn.textContent = 'Como instalar';
      show();
    } else if (isAndroid()) {
      sub.textContent = 'Si no ves el aviso: menu â‹® â†’ Instalar app.';
      btn.textContent = 'Como instalar';
      show();
    }
  }, 4500);

  // Registrar SW cuanto antes (ademas del registro de Godot al terminar de cargar)
  if ('serviceWorker' in navigator) {
    try {
      navigator.serviceWorker.register('index.service.worker.js').catch(function () {});
    } catch (e) {}
  }
})();
</script>
