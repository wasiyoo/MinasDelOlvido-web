<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>Minas del Olvido</title>
<link rel="icon" href="favicon.ico?v=202607151216" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="minas-32.png?v=202607151216">
<link rel="icon" type="image/png" sizes="48x48" href="minas-48.png?v=202607151216">
<link rel="apple-touch-icon" sizes="180x180" href="minas-180.png?v=202607151216">
<link rel="icon" type="image/png" sizes="192x192" href="minas-192.png?v=202607151216">
<link rel="icon" type="image/png" sizes="512x512" href="minas-512.png?v=202607151216">
<link rel="manifest" href="index.manifest.json?v=202607151216">
<meta name="theme-color" content="#0a0604">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Minas del Olvido">
<style>
html,body,#canvas{margin:0;padding:0;border:0}
body{color:#f0e6d8;background:#0a0604;overflow:hidden;touch-action:none;font-family:Segoe UI,Noto Sans,Arial,sans-serif}
#canvas{display:block}
#canvas:focus{outline:none}

#status{
  position:absolute;inset:0;visibility:hidden;z-index:10;
  background:#0a0604 center center / cover no-repeat;
  background-image:url('loading_splash.png?v=202607151216');
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
}
#status::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to top, rgba(6,4,2,.92) 0%, rgba(6,4,2,.55) 22%, rgba(6,4,2,0) 48%);
  pointer-events:none;
}
#status-ui{
  position:relative;z-index:2;width:min(72%,520px);margin:0 0 7vh;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
#status-title,#status-sub,#status-splash{display:none!important}
#status-label{
  font-size:13px;letter-spacing:.28em;text-transform:uppercase;
  color:#f0d9a0;text-shadow:0 2px 8px #000,0 0 12px rgba(255,180,60,.35);
  margin:0;
}
#status-progress{
  width:100%;height:16px;appearance:none;display:none;
  border:2px solid #6a4a28;border-radius:10px;
  background:linear-gradient(180deg,#1a120c,#0c0907);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.8),0 0 0 1px rgba(255,200,80,.12);
  overflow:hidden;
}
#status-progress::-webkit-progress-bar{
  background:linear-gradient(180deg,#1a120c,#0c0907);border-radius:8px;
}
#status-progress::-webkit-progress-value{
  background:linear-gradient(90deg,#8a5a12 0%,#e0a020 45%,#f5d060 70%,#c87810 100%);
  border-radius:8px;
  box-shadow:0 0 10px rgba(255,180,40,.45);
}
#status-progress::-moz-progress-bar{
  background:linear-gradient(90deg,#8a5a12 0%,#e0a020 45%,#f5d060 70%,#c87810 100%);
  border-radius:8px;
}
#status-notice{
  display:none;position:relative;z-index:2;
  background:rgba(60,25,30,.92);border:1px solid #9b3943;border-radius:.5rem;color:#e0e0e0;
  line-height:1.3;margin:0 2rem 4vh;padding:1rem;text-align:center;max-width:28rem;
}
</style>
</head>
<body>
<canvas id="canvas">Tu navegador no soporta canvas.</canvas>
<noscript>Activa JavaScript para jugar Minas del Olvido.</noscript>
<div id="status">
  <img id="status-splash" alt="">
  <h1 id="status-title">MINAS DEL OLVIDO</h1>
  <p id="status-sub">La Veta del Diablo</p>
  <div id="status-ui">
    <div id="status-label">Cargando...</div>
    <progress id="status-progress"></progress>
  </div>
  <div id="status-notice"></div>
</div>
<script src="index.js?v=202607151216"></script>
<script>
(function(){
  var KEY = 'minas_sw_reset_v11_dialog';
  if (localStorage.getItem(KEY)) return;
  if (!('serviceWorker' in navigator)) { localStorage.setItem(KEY,'1'); return; }
  navigator.serviceWorker.getRegistrations().then(function(regs){
    return Promise.all(regs.map(function(r){ return r.unregister(); }));
  }).then(function(){
    if (window.caches && caches.keys) {
      return caches.keys().then(function(keys){
        return Promise.all(keys.map(function(k){ return caches.delete(k); }));
      });
    }
  }).then(function(){
    localStorage.setItem(KEY,'1');
    location.reload();
  }).catch(function(){ localStorage.setItem(KEY,'1'); });
})();

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":17706472,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ r.update(); });
    });
  }

  const statusOverlay = document.getElementById('status');
  const statusProgress = document.getElementById('status-progress');
  const statusNotice = document.getElementById('status-notice');
  const statusLabel = document.getElementById('status-label');
  let initializing = true;
  let statusMode = '';

  function setStatusMode(mode) {
    if (statusMode === mode || !initializing) return;
    if (mode === 'hidden') {
      statusOverlay.remove();
      initializing = false;
      return;
    }
    statusOverlay.style.visibility = 'visible';
    statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
    if (statusLabel) statusLabel.style.display = mode === 'progress' ? 'block' : 'none';
    statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
    statusMode = mode;
  }

  function setStatusNotice(text) {
    statusNotice.textContent = '';
    String(text).split('\n').forEach(function(line){
      statusNotice.appendChild(document.createTextNode(line));
      statusNotice.appendChild(document.createElement('br'));
    });
  }

  function displayFailureNotice(err) {
    console.error(err);
    setStatusNotice(err && err.message ? err.message : String(err || 'Error desconocido'));
    setStatusMode('notice');
    initializing = false;
  }

  const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
  if (missing.length !== 0) {
    displayFailureNotice('Faltan funciones del navegador:\n' + missing.join('\n'));
    return;
  }

  setStatusMode('progress');
  engine.startGame({
    onProgress: function (current, total) {
      if (current > 0 && total > 0) {
        statusProgress.value = current;
        statusProgress.max = total;
        if (statusLabel) statusLabel.textContent = 'CARGANDO... ' + Math.min(100, Math.round(current / total * 100)) + '%';
      } else {
        statusProgress.removeAttribute('value');
        statusProgress.removeAttribute('max');
        if (statusLabel) statusLabel.textContent = 'CARGANDO...';
      }
    }
  }).then(function () {
    setStatusMode('hidden');
  }, displayFailureNotice);
})();
</script>
</body>
</html>
