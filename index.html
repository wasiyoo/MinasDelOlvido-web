		<script id="minas-startup-loading-js">
		(function () {
		  var ART_W = 1672;
		  var ART_H = 941;
		  var BAR_X = 471;
		  var BAR_Y = 850;
		  var BAR_W = 731;
		  var BAR_H = 31;
		  var shown = 0;

		  function layoutMinasBar() {
		    var status = document.getElementById('status');
		    var bar = document.getElementById('minas-startup-bar');
		    if (!status || !bar) return;
		    var rect = status.getBoundingClientRect();
		    var scale = Math.max(rect.width / ART_W, rect.height / ART_H);
		    var drawnW = ART_W * scale;
		    var drawnH = ART_H * scale;
		    var originX = rect.left + (rect.width - drawnW) * 0.5;
		    var originY = rect.top + (rect.height - drawnH) * 0.5;
		    bar.style.left = Math.round(originX + BAR_X * scale) + 'px';
		    bar.style.top = Math.round(originY + BAR_Y * scale) + 'px';
		    bar.style.width = Math.max(2, Math.round(BAR_W * scale)) + 'px';
		    bar.style.height = Math.max(2, Math.round(BAR_H * scale)) + 'px';
		    bar.style.borderRadius = Math.max(2, Math.round(4 * scale)) + 'px';
		  }

		  window.setMinasLoadingProgress = function (current, total) {
		    var fill = document.getElementById('minas-startup-fill');
		    if (!fill) return;
		    var next = total > 0 ? current / total : 0;
		    next = Math.max(shown, Math.min(1, Math.max(0, next)));
		    shown = next;
		    fill.style.width = (next * 100).toFixed(2) + '%';
		  };

		  layoutMinasBar();
		  window.addEventListener('resize', layoutMinasBar, { passive: true });
		  window.addEventListener('orientationchange', layoutMinasBar, { passive: true });
		  if (window.visualViewport) {
		    window.visualViewport.addEventListener('resize', layoutMinasBar, { passive: true });
		  }
		})();
		</script>

const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) { if (window.setMinasLoadingProgress) window.setMinasLoadingProgress(current, total); },
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}

    var w = Math.max(1, sz.w);
    var h = Math.max(1, sz.h);

    var body = document.body;
    var canvas = document.getElementById('canvas');
    if (html) {
      html.style.width = w + 'px';
      html.style.height = h + 'px';
